    <linearGradient id="trailer" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#d7e5f4"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="700" fill="url(#sky)"/>
  <rect y="430" width="1200" height="270" fill="url(#road)"/>
  <path d="M0 470 Q300 430 620 470 T1200 470" fill="none" stroke="#7ea2c5" stroke-width="5" opacity=".28"/>
