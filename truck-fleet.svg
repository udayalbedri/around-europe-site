<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
  <title id="title">Truck fleet illustration</title>
  <desc id="desc">Stylized logistics trucks driving on a highway.</desc>
  <defs>
    <linearGradient id="sky" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#d9eefb"/>
      <stop offset="100%" stop-color="#f7fbff"/>
    </linearGradient>
    <linearGradient id="road" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#31506c"/>
      <stop offset="100%" stop-color="#18283b"/>
    </linearGradient>
    <linearGradient id="cab" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f68b28"/>
      <stop offset="100%" stop-color="#d56000"/>
